<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guidance System — Final Decision Review</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--s:#161b22;--s2:#1c2128;--b:#30363d;--t:#e6edf3;--t2:#8b949e;--a:#58a6ff;--g:#3fb950;--am:#d29922;--r:#f85149;--p:#bc8cff;--pk:#f778ba;--cy:#39d2c0;--rd:6px;--m:'SF Mono','Cascadia Code','Consolas',monospace;--f:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:var(--f);font-size:13px;overflow:hidden}
body{display:flex;flex-direction:column}
.hdr{display:flex;align-items:center;gap:12px;padding:8px 16px;border-bottom:1px solid var(--b);background:var(--s);flex-shrink:0}
.hdr h1{font-size:14px;font-weight:600}.hdr .sub{font-size:11px;color:var(--t2)}
.hdr .progress{font-size:11px;color:var(--g);font-weight:600;margin-left:12px}
.stats{display:flex;gap:14px;margin-left:auto;font-size:11px}.st{display:flex;align-items:center;gap:4px}.st .d{width:8px;height:8px;border-radius:50%}.st .c{font-weight:600}
.st.pend .d{background:var(--am)}.st.appr .d{background:var(--g)}.st.rej .d{background:var(--r)}.st.cmt .d{background:var(--p)}
.main{display:flex;flex:1;overflow:hidden}
.left{width:220px;min-width:200px;border-right:1px solid var(--b);background:var(--s);overflow-y:auto;flex-shrink:0}
.left::-webkit-scrollbar{width:5px}.left::-webkit-scrollbar-thumb{background:var(--b);border-radius:3px}
.grp{padding:2px 0;border-bottom:1px solid var(--b);cursor:pointer;transition:background .1s}
.grp:hover{background:var(--s2)}.grp.active{background:rgba(88,166,255,.08);border-left:3px solid var(--a)}
.grp-inner{padding:6px 10px}
.grp-name{font-size:11px;font-weight:600;color:var(--t)}.grp-count{font-size:10px;color:var(--t2);margin-top:1px}
.grp-bar{display:flex;gap:1px;margin-top:4px;height:4px;border-radius:2px;overflow:hidden}
.grp-bar div{height:100%;border-radius:1px}.bar-g{background:var(--g)}.bar-am{background:var(--am)}.bar-r{background:var(--r)}
.center{flex:1;display:flex;flex-direction:column;overflow:hidden}
.filter-bar{display:flex;gap:0;border-bottom:1px solid var(--b);background:var(--s2);flex-shrink:0}
.ftab{flex:1;padding:6px 4px;text-align:center;font-size:11px;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.ftab:hover{color:var(--t)}.ftab.active{color:var(--a);border-bottom-color:var(--a)}.ftab .fc{font-weight:600;margin-left:3px}
.items{flex:1;overflow-y:auto;padding:8px}.items::-webkit-scrollbar{width:5px}.items::-webkit-scrollbar-thumb{background:var(--b);border-radius:3px}
.card{border:1px solid var(--b);border-radius:var(--rd);margin-bottom:6px;overflow:hidden;transition:.15s}
.card:hover{border-color:var(--t2)}.card.active{border-color:var(--a);box-shadow:0 0 0 1px var(--a)}
.card.ap{border-left:3px solid var(--g)}.card.rj{border-left:3px solid var(--r);opacity:.55}.card.rj:hover{opacity:1}
.card-hd{padding:8px 10px;cursor:pointer}
.card-meta{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.badge{font-size:9px;padding:1px 5px;border-radius:3px;border:1px solid var(--b);color:var(--t2)}
.badge.conflict{border-color:var(--am);color:var(--am);background:rgba(210,153,34,.1)}
.badge.decided{border-color:var(--g);color:var(--g);background:rgba(63,185,80,.1)}
.badge.wip{border-color:var(--cy);color:var(--cy);background:rgba(57,210,192,.1)}
.badge.src{}.card-cat{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--s2);color:var(--t2)}
.card-id{font-size:10px;color:var(--t2);font-family:var(--m);margin-left:auto}
.card-title{font-size:12px;font-weight:600;color:var(--t);margin-bottom:3px}
.card-text{font-size:11px;color:var(--t2);line-height:1.5}
.card-opts{margin-top:6px;padding:6px 8px;background:var(--bg);border-radius:4px;font-size:11px}
.card-opts .opt-label{color:var(--am);font-weight:600;margin-bottom:3px;font-size:10px;text-transform:uppercase}
.opt{padding:3px 6px;margin:2px 0;border-radius:3px;cursor:pointer;display:flex;align-items:flex-start;gap:4px;transition:.1s;border-left:2px solid transparent}
.opt:hover{background:rgba(255,255,255,.04)}.opt.sel{background:rgba(88,166,255,.1);border-left-color:var(--a)}
.opt-radio{color:var(--t2);flex-shrink:0;width:14px;text-align:center}.opt.sel .opt-radio{color:var(--a)}
.opt b{color:var(--t)}.opt .desc{color:var(--t2)}
.rec{font-size:9px;color:var(--cy);border:1px solid var(--cy);padding:0 3px;border-radius:2px;margin-left:4px}
.card-note{margin-top:6px;padding:4px 8px;background:rgba(188,140,255,.08);border-radius:3px;font-size:11px;color:var(--p)}
.wip-note{margin-top:4px;font-size:10px;color:var(--cy);line-height:1.4}
.prior-note{margin-top:4px;font-size:10px;color:var(--g)}
.card-acts{display:flex;gap:4px;padding:6px 10px;border-top:1px solid var(--b);background:var(--s2)}
.btn{flex:1;padding:4px 8px;border:1px solid var(--b);border-radius:4px;background:transparent;color:var(--t2);cursor:pointer;font-size:11px;font-family:var(--f);text-align:center;transition:.15s}
.btn:hover{border-color:var(--t2);color:var(--t)}
.btn.ap:hover,.btn.ap.on{border-color:var(--g);color:var(--g);background:rgba(63,185,80,.1)}
.btn.rj:hover,.btn.rj.on{border-color:var(--r);color:var(--r);background:rgba(248,81,73,.1)}
.btn.cm:hover,.btn.cm.on{border-color:var(--p);color:var(--p);background:rgba(188,140,255,.1)}
.btn.rs{font-size:10px;flex:.4}
.cmt-area{padding:6px 10px;border-top:1px solid var(--b);display:none}.cmt-area.open{display:block}
.cmt-area textarea{width:100%;min-height:44px;background:var(--bg);border:1px solid var(--b);border-radius:4px;color:var(--t);font-family:var(--f);font-size:11px;padding:6px 8px;resize:vertical}
.cmt-area textarea:focus{outline:none;border-color:var(--a)}
.prompt{border-top:1px solid var(--b);background:var(--s);padding:10px 16px;flex-shrink:0;max-height:220px;overflow-y:auto}
.prompt::-webkit-scrollbar{width:5px}.prompt::-webkit-scrollbar-thumb{background:var(--b);border-radius:3px}
.prompt-hd{display:flex;align-items:center;margin-bottom:6px}
.prompt-hd span{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.copy{margin-left:auto;padding:3px 10px;border:1px solid var(--b);border-radius:var(--rd);background:var(--s2);color:var(--t2);cursor:pointer;font-size:11px;font-family:var(--f)}
.copy:hover{border-color:var(--a);color:var(--a)}.copy.ok{border-color:var(--g);color:var(--g)}
.prompt-txt{font-family:var(--m);font-size:11px;line-height:1.6;color:var(--t);white-space:pre-wrap}
.bulk{display:flex;gap:4px;padding:5px 8px;border-bottom:1px solid var(--b);flex-shrink:0}
.bbtn{padding:3px 8px;border:1px solid var(--b);border-radius:4px;background:transparent;color:var(--t2);cursor:pointer;font-size:10px;font-family:var(--f)}.bbtn:hover{border-color:var(--t2);color:var(--t)}
.empty{text-align:center;padding:40px 20px;color:var(--t2)}
</style>
</head>
<body>
<div class="hdr">
<div><h1>Guidance System — Final Decision Review</h1>
<div class="sub">All decisions from: guidanceWIP.md, guidance-extract.md, SKILL.md, guidanceInventory.md, guidance_inventory_old.md</div></div>
<div class="progress" id="prog"></div>
<div class="stats" id="stats"></div>
</div>
<div class="main">
<div class="left" id="groups"></div>
<div class="center">
<div class="filter-bar" id="fbar"></div>
<div class="bulk">
<button class="bbtn" onclick="bulk('approve')">Approve visible</button>
<button class="bbtn" onclick="bulk('reject')">Reject visible</button>
<button class="bbtn" onclick="bulk('reset')">Reset visible</button>
<button class="bbtn" style="margin-left:auto;border-color:var(--cy);color:var(--cy)" onclick="setFilter('pending')">Show pending only</button>
</div>
<div class="items" id="items"></div>
<div class="prompt">
<div class="prompt-hd"><span>Decision Prompt</span><button class="copy" onclick="cp()">Copy</button></div>
<div class="prompt-txt" id="prompt">Review items to generate prompt...</div>
</div>
</div>
</div>
<script>
const G=[
{id:'arch',name:'Architecture & Approach',desc:'High-level system design decisions'},
{id:'model',name:'Data Model & Fields',desc:'Entry structure, field definitions, types'},
{id:'class',name:'Classification & State',desc:'Actions, anchors, supersession'},
{id:'source',name:'Source Processing',desc:'Which sources, priority, extraction rules'},
{id:'output',name:'Output Format & Sections',desc:'File structure, sections, rendering'},
{id:'capture',name:'Critical Capture Items',desc:'The 10 must-track items (A-J)'},
{id:'fiscal',name:'Fiscal Calendar',desc:'FYE detection, period mapping, edge cases'},
{id:'invoke',name:'Invocation & Trigger',desc:'How the system is called'},
{id:'valid',name:'Validation & Errors',desc:'Failure policy, idempotency, safety'},
{id:'open',name:'Open Questions',desc:'Unresolved G1-G8 + O1-O5 requiring your decision'},
{id:'phase',name:'Implementation Phases',desc:'Build sequence and done criteria'},
{id:'integ',name:'Integration & Consumers',desc:'Orchestrator, predictor, attribution'}
];

// def: default status. wipOpt: WIP-recommended option index. wip: WIP resolution note. prior: user prior decision.
const S=[
// ─── ARCHITECTURE (arch) ──────────────────────────────
{id:1,g:'arch',cat:'approach',title:'Standalone vs orchestrator-coupled',
text:'The inventory works independently. Any consumer reads the file. Orchestrator does NOT build it.',
sources:['guidanceWIP \u00a79','guidanceInventory \u00a713'],def:'approved',
wip:'WIP \u00a79: Decoupled. R8 requires independence. Orchestrator reads file; doesnt build it.'},

{id:2,g:'arch',cat:'approach',title:'Per-Document Extraction (Approach A) \u2014 CHOSEN',
text:'Process ONE document at a time as it arrives. Always current, simple trigger, easy to debug. Limited cross-source context mitigated by reading existing inventory.',
sources:['guidanceWIP \u00a74,\u00a79'],def:'approved',
wip:'WIP \u00a79: Chosen as primary extraction model. Natural for incremental arrival.'},

{id:3,g:'arch',cat:'approach',title:'Agent Teams / Batch (Approach B) \u2014 NOT CHOSEN',
text:'Spawn parallel specialist agents, reconcile at end. THIS produced the AAPL quality benchmark. Rich output but expensive, not incremental.',
sources:['guidanceWIP \u00a74'],def:'rejected',
wip:'WIP \u00a79: Not chosen. Batch-oriented, not naturally incremental. Overkill for single-doc processing.'},

{id:4,g:'arch',cat:'approach',title:'Hybrid: Extract per-doc, Compile periodically (Approach C) \u2014 NOT CHOSEN',
text:'Cheap per-doc extraction + thorough periodic compilation. Two layers = more moving parts, needs intermediate format.',
sources:['guidanceWIP \u00a74'],def:'rejected',
wip:'WIP \u00a79: Not chosen. Intermediate format adds complexity. Synthesis pass achieves same benefit with simpler design.'},

{id:5,g:'arch',cat:'decision',title:'CHOSEN: Per-doc extraction + synthesis pass',
text:'Approach A + separate synthesis pass for meta-analysis. Extraction per document, synthesis across quarters.',
sources:['guidanceWIP \u00a79'],def:'approved',conflict:true,
opts:[{l:'Per-doc + Synthesis (WIP choice)',d:'Natural for incremental. Synthesis handles cross-quarter analysis.'},{l:'Agent Teams (produced benchmark)',d:'Higher quality cross-source. More expensive. Batch-oriented.'},{l:'Hybrid (extract + compile)',d:'Always current + high quality. Two-layer complexity.'}],
wipOpt:0,wip:'WIP \u00a79: Chosen. Update lifecycle is deciding factor. Guidance arrives incrementally.'},

{id:6,g:'arch',cat:'decision',title:'Cumulative file, never destructive overwrite',
text:'File grows over time. New guidance appended, old marked superseded. Never delete historical entries.',
sources:['guidance_inventory_old Q1','guidanceInventory \u00a78'],def:'approved',
prior:'User decided: cumulative (old Q1)'},

{id:7,g:'arch',cat:'decision',title:'Per-company file (not per-quarter, not universe)',
text:'One file per company at earnings-analysis/Companies/{TICKER}/guidance-inventory.md.',
sources:['guidance_inventory_old Q3','guidanceInventory \u00a710'],def:'approved',
prior:'User decided: per-company (old Q3)'},

{id:8,g:'arch',cat:'decision',title:'Historical depth: Q1=all, Q>=2=3 months',
text:'Q1 (first quarter for company): pull ALL historical guidance. Q2-Q4: only last 3 months.',
sources:['guidance_inventory_old Q5','SKILL.md \u00a71'],def:'approved',
prior:'User decided (old Q5)'},

{id:9,g:'arch',cat:'design',title:'SDK-compatible, non-interactive execution',
text:'No AskUserQuestion, no manual approval. Fail fast on missing inputs. Deterministic for replayability.',
sources:['guidanceInventory \u00a71.2'],def:'approved'},

{id:10,g:'arch',cat:'design',title:'File-authoritative state (filesystem = source of truth)',
text:'On-disk output determines completion/resume. No separate database for guidance state.',
sources:['guidanceInventory \u00a712,\u00a74'],def:'approved'},

// ─── DATA MODEL (model) ──────────────────────────────
{id:11,g:'model',cat:'schema',title:'18-field extraction schema',
text:'period_type, fiscal_year, fiscal_quarter, segment, metric, low, mid, high, unit, basis, derivation, qualitative, source_type, source_id, source_key, given_date, section, quote',
sources:['guidanceWIP \u00a710.7','guidance-extract.md'],def:'approved',
wip:'All files agree on these 18 fields. Core extraction schema.'},

{id:12,g:'model',cat:'schema',title:'6 derived/computed fields',
text:'action, prior_value_mid, revision_pct, entry_id, status, superseded_by \u2014 computed during classification, not extracted from source.',
sources:['guidanceWIP \u00a710.7'],def:'approved'},

{id:13,g:'model',cat:'field',title:'period_type enum values',
text:'All files use quarter/annual/half/long-range. SKILL.md and old plan add "other" for stub periods and edge cases.',
sources:['guidanceWIP','SKILL.md','old','FISCAL_CALENDAR.md'],
opts:[{l:'4 types (quarter/annual/half/long-range)',d:'WIP and guidance-extract use these 4. Clean and simple.'},{l:'5 types (+other)',d:'SKILL.md adds "other" for stub periods, M&A transitions, FYE changes.'}],
wipOpt:0,wip:'WIP uses 4 types. But FISCAL_CALENDAR.md documents stub period edge cases.'},

{id:14,g:'model',cat:'field',title:'derivation: explicit | calculated | point | implied',
text:'How values were determined. explicit=all stated, calculated=mid computed from low+high, point=single value (low=mid=high), implied=qualitative only (all null).',
sources:['guidance-extract.md','guidanceWIP \u00a710.7'],def:'approved'},

{id:15,g:'model',cat:'field',title:'segment field and rules',
text:'Default "Total". Qualified by prefix: "services revenue" \u2192 Services, "iPhone revenue" \u2192 iPhone. Unqualified \u2192 Total.',
sources:['guidance-extract.md'],def:'approved'},

{id:16,g:'model',cat:'field',title:'Metric normalization table',
text:'EPS (=earnings per share, diluted EPS), Revenue (=net sales), Gross Margin, Operating Margin, CapEx, FCF, Operating Income, Net Income. Unknown: preserve exact wording.',
sources:['guidance-extract.md'],def:'approved'},

{id:17,g:'model',cat:'field',title:'basis field values: GAAP | non-GAAP | adjusted | constant-currency | as-reported',
text:'Track for every entry. Different bases = completely separate guidance tracks. Definition drift flagged as Critical Capture B.',
sources:['guidanceWIP R9','guidance-extract.md','old \u00a7B'],def:'approved'},

{id:18,g:'model',cat:'field',title:'qualitative field for non-numeric guidance',
text:'"low to mid single digits", "double-digit", "margin expansion". derivation=implied, low/mid/high all null.',
sources:['guidance-extract.md','SKILL.md'],def:'approved'},

{id:19,g:'model',cat:'field',title:'quote: max 500 chars, pipes replaced with broken bar',
text:'Exact or near-exact quote from source. Truncate at sentence boundary with "..." if exceeds 500 chars.',
sources:['guidance-extract.md'],def:'approved'},

{id:20,g:'model',cat:'field',title:'entry_id generation scheme',
text:'Format: {Period}-{Metric}-{sequence}. e.g., FY25-EPS-001, Q3FY25-Revenue-002. Sequence counter needs definition.',
sources:['guidanceWIP O4','SKILL.md'],
opts:[{l:'Zero-padded counter (001, 002, ...)',d:'Count existing entries for that period+metric, increment. Simple. Risk: renumbering on reprocess.'},{l:'Date suffix (FY25-EPS-20250731)',d:'Use given_date. Naturally ordered. Unique per date.'},{l:'Source-hash suffix (FY25-EPS-a3f)',d:'Short hash of source_id. Idempotent across reprocessing.'}],
wip:'WIP O4: Listed as open. Needs decision.'},

{id:21,g:'model',cat:'field',title:'calendar_start / calendar_end derived from FYE',
text:'Not extracted \u2014 computed from fiscal_year + fiscal_quarter + company FYE month using FISCAL_CALENDAR.md logic.',
sources:['FISCAL_CALENDAR.md','SKILL.md'],def:'approved'},

{id:22,g:'model',cat:'schema',title:'GuidancePeriod dataclass shape',
text:'period_type, fiscal_year, fiscal_quarter + optional calendar fields. Also has period_status computed property.',
sources:['SKILL.md','old'],
opts:[{l:'With calendar_start/end stored',d:'Pre-computed calendar dates in the period object. Useful for filtering.'},{l:'Compute on-the-fly from FYE',d:'Dont store calendar dates. Recompute when needed. Less data.'}],
wipOpt:0,wip:'WIP \u00a710.7 lists calendar fields. OUTPUT_TEMPLATE uses them in tables.'},

{id:23,g:'model',cat:'schema',title:'GuidanceEntry dataclass \u2014 full shape',
text:'period(GuidancePeriod) + metric fields + citation fields + state fields. SKILL.md has page_or_section; guidance-extract has section. Same concept.',
sources:['SKILL.md','old','guidanceWIP'],def:'approved',
wip:'Field naming: use "section" (from guidance-extract). 18 extraction fields + 6 derived fields = 24 total fields per entry.'},

{id:24,g:'model',cat:'field',title:'Guidance category tags: Financial-Hard/Soft, Operational, Qualitative',
text:'Old plan categorizes guidance types. WIP extracts everything without explicit categories. Should entries have a category tag?',
sources:['old \u00a71','SKILL.md'],
opts:[{l:'No category tags (WIP approach)',d:'Just extract everything. The metric name and derivation field imply the type.'},{l:'Add category field (Hard/Soft/Operational/Qualitative)',d:'Explicit tagging. Useful for filtering and analysis.'}],
wipOpt:0,wip:'WIP doesnt use explicit categories. Metric + derivation field covers the distinction.'},

// ─── CLASSIFICATION (class) ──────────────────────────
{id:25,g:'class',cat:'rule',title:'7 action types (all files agree)',
text:'INITIAL, RAISED, LOWERED, MAINTAINED, NARROWED, WIDENED, WITHDRAWN. Deterministic rules based on midpoint comparison.',
sources:['all files'],def:'approved'},

{id:26,g:'class',cat:'rule',title:'Matching rule for "prior guidance"',
text:'Same metric + period_type + fiscal_year + fiscal_quarter + segment + basis. Different basis = separate track.',
sources:['guidanceWIP \u00a710.8'],def:'approved'},

{id:27,g:'class',cat:'rule',title:'Anchor rule: first annual guidance = anchor',
text:'First annual guidance for a fiscal year establishes the anchor midpoint (typically from Q4 call of prior year or Q1 call). All revisions measured vs anchor.',
sources:['SKILL.md','old \u00a72','guidanceWIP \u00a710.8'],def:'approved'},

{id:28,g:'class',cat:'rule',title:'Supersession: never delete, mark superseded',
text:'Old entry gets status=superseded, superseded_by={new_entry_id}. Full audit chain must be preserved.',
sources:['guidanceInventory \u00a78','SKILL.md','OUTPUT_TEMPLATE.md'],def:'approved'},

{id:29,g:'class',cat:'rule',title:'One earnings call addresses multiple periods',
text:'Q1 call may address: Q1 actuals (past), Q2 guidance (future), FY full year (current). Each period tracked separately.',
sources:['old \u00a72','SKILL.md'],def:'approved'},

// ─── SOURCE PROCESSING (source) ──────────────────────
{id:30,g:'source',cat:'priority',title:'Source priority / richness ranking',
text:'All files agree on rough order but details differ. WIP says Transcript > 8-K based on AAPL (where 8-K had zero guidance).',
sources:['guidanceWIP \u00a72','SKILL.md','old \u00a75'],conflict:true,
opts:[{l:'Transcript > 8-K > News > 10-Q (WIP)',d:'Based on AAPL sample. Transcript richest. 8-K had zero guidance for AAPL. Generalizes for quality.'},{l:'8-K > Transcript > News (SKILL/old)',d:'8-K is official record. Highest reliability. Transcript adds context.'}],
wipOpt:0,wip:'WIP \u00a72: Transcript is richest single source. AAPLs best content all came from transcripts.'},

{id:31,g:'source',cat:'extraction',title:'8-K EX-99.1: Outlook sections, tables, footnotes',
text:'Official headline numbers. Check Outlook/Guidance section, financial highlights tables, GAAP vs non-GAAP footnotes. Also check Item 7.01 and 8.01.',
sources:['guidance-extract.md','guidanceWIP \u00a710.4'],def:'approved'},

{id:32,g:'source',cat:'extraction',title:'Transcript: CFO prepared remarks = formal guidance home',
text:'CFO section has formal guidance numbers. CEO has strategic outlook. Q&A has probing detail, segment color, management caveats.',
sources:['guidance-extract.md','guidanceWIP \u00a710.4'],def:'approved'},

{id:33,g:'source',cat:'extraction',title:'Transcript: Q&A extraction depth',
text:'Q&A is where analysts probe beyond prepared remarks. Revenue bridges, margin philosophy, segment refusals. AAPLs best content came from Q&A.',
sources:['guidance-extract.md','guidanceWIP \u00a710.4'],
opts:[{l:'Full Q&A (all exchanges)',d:'Maximum recall. Best guidance probing detail comes from Q&A. WIP design assumes this.'},{l:'CFO/CEO responses only',d:'Skip analyst questions, just extract management answers. Faster.'},{l:'Prepared remarks only (skip Q&A)',d:'Fastest, cheapest. Misses probing detail and segment color.'}],
wipOpt:0,wip:'WIP \u00a710.4: Designed for full Q&A processing. AAPL samples best content came from Q&A exchanges.'},

{id:34,g:'source',cat:'extraction',title:'Transcript enrichment rule (not duplication)',
text:'When transcript has guidance for same metric/period as existing 8-K entry: ADD Q&A context to existing entry. Dont create duplicate.',
sources:['guidanceWIP \u00a710.4'],def:'approved',
wip:'WIP \u00a710.4: Transcript enriches existing entries. Adds Q&A context, management caveats, segment color.'},

{id:35,g:'source',cat:'extraction',title:'News: filter analyst estimates vs company guidance',
text:'"expects/revises/reaffirms" = company guidance \u2192 EXTRACT. "versus consensus/Est $X" = analyst estimate \u2192 DO NOT EXTRACT.',
sources:['guidance-extract.md','guidanceWIP \u00a710.4'],def:'approved'},

{id:36,g:'source',cat:'extraction',title:'News: conflict detection with 8-K/transcript',
text:'If news says "13-16% growth" but transcript says "low to mid single digits" \u2192 flag in Source Conflicts. (Happened with AAPL.)',
sources:['guidanceWIP \u00a710.4'],def:'approved'},

{id:37,g:'source',cat:'extraction',title:'10-Q/10-K: rarely explicit guidance',
text:'MD&A mostly boilerplate. Only extract if specific numbers/ranges/direction. DO note new risk language.',
sources:['guidance-extract.md','guidanceWIP \u00a710.4'],def:'approved'},

{id:38,g:'source',cat:'extraction',title:'10-Q arrival triggers accuracy resolution',

// ─── STATE ───────────────────────────────────────────
const state={
  items:S.map(s=>({...s,status:s.def||'pending',comment:'',selOpt:s.wipOpt??null})),
  filter:'all',group:'all',active:null,commentOpen:{}
};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function visible(){let f=state.items;if(state.group!=='all')f=f.filter(i=>i.g===state.group);if(state.filter!=='all')f=f.filter(i=>i.status===state.filter);return f}

// ─── RENDER ──────────────────────────────────────────
function renderGroups(){
const el=document.getElementById('groups');
const pend=state.items.filter(i=>i.status==='pending').length;
let h=`<div class="grp${state.group==='all'?' active':''}" onclick="setGroup('all')"><div class="grp-inner"><div class="grp-name">All Items</div><div class="grp-count">${state.items.length} items \u2014 ${pend} pending</div></div></div>`;
for(const g of G){
const items=state.items.filter(i=>i.g===g.id);
const ap=items.filter(i=>i.status==='approved').length;
const rj=items.filter(i=>i.status==='rejected').length;
const pn=items.length-ap-rj;
h+=`<div class="grp${state.group===g.id?' active':''}" onclick="setGroup('${g.id}')"><div class="grp-inner">
<div class="grp-name">${esc(g.name)}</div>
<div class="grp-count">${items.length} \u2014 ${pn?pn+' pending':'all decided'}</div>
<div class="grp-bar">${ap?`<div class="bar-g" style="flex:${ap}"></div>`:''}${pn?`<div class="bar-am" style="flex:${pn}"></div>`:''}${rj?`<div class="bar-r" style="flex:${rj}"></div>`:''}</div>
</div></div>`;
}
el.innerHTML=h;
}

function renderFilters(){
const v=state.group==='all'?state.items:state.items.filter(i=>i.g===state.group);
const c={all:v.length,pending:v.filter(i=>i.status==='pending').length,approved:v.filter(i=>i.status==='approved').length,rejected:v.filter(i=>i.status==='rejected').length};
document.getElementById('fbar').innerHTML=['all','pending','approved','rejected'].map(f=>
`<div class="ftab${state.filter===f?' active':''}" onclick="setFilter('${f}')">${f.charAt(0).toUpperCase()+f.slice(1)}<span class="fc">${c[f]}</span></div>`).join('');
}

function renderItems(){
renderFilters();
const v=visible();
const el=document.getElementById('items');
if(!v.length){el.innerHTML='<div class="empty">No items match filters \u2014 '+state.items.filter(i=>i.status==='pending').length+' pending total</div>';return;}
let h='';
for(const s of v){
const ac=state.active===s.id;
const sc=s.status==='approved'?' ap':s.status==='rejected'?' rj':'';
const co=state.commentOpen[s.id];
h+=`<div class="card${sc}${ac?' active':''}" id="c-${s.id}">`;
h+=`<div class="card-hd" onclick="activate(${s.id})">`;
h+=`<div class="card-meta">`;
if(s.conflict)h+=`<span class="badge conflict">CONFLICT</span>`;
if(s.prior)h+=`<span class="badge decided">PRIOR</span>`;
if(s.wip&&s.def)h+=`<span class="badge wip">WIP DECIDED</span>`;
else if(s.wip&&!s.def)h+=`<span class="badge wip">WIP REC</span>`;
for(const src of (s.sources||[]))h+=`<span class="badge src">${esc(src)}</span>`;
h+=`<span class="card-cat">${esc(s.cat)}</span>`;
h+=`<span class="card-id">#${s.id}</span></div>`;
h+=`<div class="card-title">${esc(s.title)}</div>`;
h+=`<div class="card-text">${esc(s.text)}</div>`;
if(s.prior)h+=`<div class="prior-note">Prior decision: ${esc(s.prior)}</div>`;
if(s.wip)h+=`<div class="wip-note">WIP: ${esc(s.wip)}</div>`;
if(s.opts){
h+=`<div class="card-opts"><div class="opt-label">${s.opts.length} Options \u2014 click to select:</div>`;
for(let i=0;i<s.opts.length;i++){
const o=s.opts[i];
const sel=s.selOpt===i;
const isWip=s.wipOpt===i;
h+=`<div class="opt${sel?' sel':''}" onclick="event.stopPropagation();pickOpt(${s.id},${i})">`;
h+=`<span class="opt-radio">${sel?'\u25cf':'\u25cb'}</span>`;
h+=`<b>${String.fromCharCode(65+i)}.</b> <b>${esc(o.l)}</b>`;
if(isWip)h+=` <span class="rec">\u2190 WIP</span>`;
h+=` \u2014 <span class="desc">${esc(o.d)}</span>`;
h+=`</div>`;
}
h+=`</div>`;
}
if(s.comment)h+=`<div class="card-note"><b>Your note:</b> ${esc(s.comment)}</div>`;
h+=`</div>`;
h+=`<div class="card-acts">`;
h+=`<button class="btn ap${s.status==='approved'?' on':''}" onclick="event.stopPropagation();act(${s.id},'approved')">Approve</button>`;
h+=`<button class="btn rj${s.status==='rejected'?' on':''}" onclick="event.stopPropagation();act(${s.id},'rejected')">Reject</button>`;
h+=`<button class="btn cm${co?' on':''}" onclick="event.stopPropagation();togCmt(${s.id})">Comment</button>`;
if(s.status!=='pending')h+=`<button class="btn rs" onclick="event.stopPropagation();act(${s.id},'pending')">Reset</button>`;
h+=`</div>`;
h+=`<div class="cmt-area${co?' open':''}"><textarea placeholder="Your note (option choice, conditions, modifications)..." oninput="updCmt(${s.id},this.value)">${esc(s.comment)}</textarea></div>`;
h+=`</div>`;
}
el.innerHTML=h;
}

function renderStats(){
const c={pending:0,approved:0,rejected:0,commented:0};
state.items.forEach(i=>{c[i.status]++;if(i.comment.trim())c.commented++});
const total=state.items.length;
const decided=c.approved+c.rejected;
document.getElementById('stats').innerHTML=
`<div class="st pend"><div class="d"></div><span class="c">${c.pending}</span> pending</div>`+
`<div class="st appr"><div class="d"></div><span class="c">${c.approved}</span> approved</div>`+
`<div class="st rej"><div class="d"></div><span class="c">${c.rejected}</span> rejected</div>`+
`<div class="st cmt"><div class="d"></div><span class="c">${c.commented}</span> commented</div>`;
document.getElementById('prog').textContent=`${decided}/${total} decided (${Math.round(decided/total*100)}%)`;
}

function setGroup(g){state.group=g;state.filter='all';renderGroups();renderItems();renderStats()}
function setFilter(f){state.filter=f;renderItems()}
function activate(id){state.active=id;renderItems()}
function act(id,s){const i=state.items.find(x=>x.id===id);if(i)i.status=s;renderGroups();renderItems();renderStats();updPrompt()}
function pickOpt(id,idx){const i=state.items.find(x=>x.id===id);if(i){i.selOpt=idx;if(i.status==='pending')i.status='approved'}renderGroups();renderItems();renderStats();updPrompt()}
function togCmt(id){state.commentOpen[id]=!state.commentOpen[id];renderItems()}
function updCmt(id,v){const i=state.items.find(x=>x.id===id);if(i)i.comment=v;updPrompt()}
function bulk(a){const v=visible();v.forEach(i=>{if(a==='reset'){i.status='pending';i.comment='';i.selOpt=i.wipOpt??null}else i.status=a==='approve'?'approved':'rejected'});renderGroups();renderItems();renderStats();updPrompt()}

// ─── PROMPT ──────────────────────────────────────────
function updPrompt(){
const ap=state.items.filter(i=>i.status==='approved');
const rj=state.items.filter(i=>i.status==='rejected');
const cm=state.items.filter(i=>i.comment.trim()&&i.status==='pending');
const pn=state.items.filter(i=>i.status==='pending'&&!i.comment.trim());
const total=state.items.length;
const decided=ap.length+rj.length;
if(!decided&&!cm.length){document.getElementById('prompt').textContent='Approve, reject, or comment on items to build decision prompt... ('+pn.length+' pending)';return}

const parts=[`# Guidance System \u2014 Final Decisions (${decided}/${total} decided)\n`];
const byGroup=(items)=>{const m={};items.forEach(i=>{const g=G.find(x=>x.id===i.g);const n=g?g.name:i.g;if(!m[n])m[n]=[];m[n].push(i)});return m};
const optText=(i)=>{if(i.opts&&i.selOpt!==null&&i.selOpt!==undefined&&i.opts[i.selOpt])return ` \u2192 Selected: ${String.fromCharCode(65+i.selOpt)}. ${i.opts[i.selOpt].l}`;return ''};

if(ap.length){
parts.push(`## APPROVED (${ap.length})\n`);
const grouped=byGroup(ap);
for(const[gn,items]of Object.entries(grouped)){
parts.push(`### ${gn}`);
for(const i of items){
let line=`- **#${i.id}: ${i.title}**${optText(i)}`;
if(i.comment)line+=`\n  Note: ${i.comment.trim()}`;
parts.push(line);
}
parts.push('');
}}

if(rj.length){
parts.push(`## REJECTED (${rj.length})\n`);
const grouped=byGroup(rj);
for(const[gn,items]of Object.entries(grouped)){
parts.push(`### ${gn}`);
for(const i of items){
parts.push(`- **#${i.id}: ${i.title}** \u2014 Reason: ${i.comment.trim()||'(no reason given)'}`);
}
parts.push('');
}}

if(cm.length){
parts.push(`## NEEDS DISCUSSION (${cm.length})\n`);
for(const i of cm)parts.push(`- **#${i.id}: ${i.title}**${optText(i)} \u2014 ${i.comment.trim()}`);
parts.push('');
}

if(pn.length){
parts.push(`## STILL PENDING (${pn.length}) \u2014 these MUST be decided before implementation:\n`);
const grouped=byGroup(pn);
for(const[gn,items]of Object.entries(grouped))
parts.push(`- ${gn}: ${items.map(i=>'#'+i.id+' '+i.title.substring(0,40)).join(', ')}`);
}

document.getElementById('prompt').textContent=parts.join('\n');
}

function cp(){
navigator.clipboard.writeText(document.getElementById('prompt').textContent).then(()=>{
const b=document.querySelector('.copy');b.textContent='Copied!';b.classList.add('ok');
setTimeout(()=>{b.textContent='Copy';b.classList.remove('ok')},1500);
})}

// ─── INIT ────────────────────────────────────────────
renderGroups();renderItems();renderStats();updPrompt();
</script>
