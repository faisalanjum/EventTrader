# Apply AFTER filling in your real Telegram bot token:
#   kubectl -n monitoring create secret generic ibkr-telegram-bot \
#     --from-literal=token=YOUR_BOT_TOKEN_HERE
#
# Or apply this manifest after replacing the placeholder:
apiVersion: v1
kind: Secret
metadata:
  name: ibkr-telegram-bot
  namespace: monitoring
type: Opaque
stringData:
  token: "REPLACE_WITH_YOUR_TELEGRAM_BOT_TOKEN"
