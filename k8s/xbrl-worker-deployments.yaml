---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xbrl-worker-heavy
  namespace: processing
spec:
  replicas: 0  # KEDA will manage replica count
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0          # terminate old pod before creating new (avoid double-memory)
      maxUnavailable: 1    # queue workers tolerate brief gap
  selector:
    matchLabels:
      app: xbrl-worker-heavy
  template:
    metadata:
      labels:
        app: xbrl-worker-heavy
        worker-type: heavy
        xbrl-worker: "true"
    spec:
      priorityClassName: worker-standard
      # Node affinity to prefer minisforum2/minisforum over minisforum3 (Neo4j node)
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - minisforum2
                - minisforum
          - weight: 10  # Lower priority for Neo4j node
            preference:
              matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - minisforum3
      containers:
      - name: xbrl-worker
        image: faisalanjum/xbrl-worker:latest
        imagePullPolicy: Always
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: XBRL_QUEUE
          value: reports:queues:xbrl:heavy
        - name: SELF_EXIT_ENABLED
          value: "true"
        - name: JOB_COUNT_THRESHOLD
          value: "10"
        envFrom:
        - secretRef:
            name: eventtrader-secrets
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "3"
            memory: "20Gi"
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        hostPath:
          path: /home/faisal/EventMarketDB/logs
          type: DirectoryOrCreate
      # Longer termination grace period for heavy reports
      terminationGracePeriodSeconds: 300
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xbrl-worker-medium
  namespace: processing
spec:
  replicas: 0  # KEDA will manage replica count
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: xbrl-worker-medium
  template:
    metadata:
      labels:
        app: xbrl-worker-medium
        worker-type: medium
        xbrl-worker: "true"
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - minisforum2
                - minisforum
          - weight: 10  # Lower priority for Neo4j node
            preference:
              matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - minisforum3
      containers:
      - name: xbrl-worker
        image: faisalanjum/xbrl-worker:latest
        imagePullPolicy: Always
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: XBRL_QUEUE
          value: reports:queues:xbrl:medium
        - name: SELF_EXIT_ENABLED
          value: "true"
        - name: JOB_COUNT_THRESHOLD
          value: "20"
        envFrom:
        - secretRef:
            name: eventtrader-secrets
        resources:
          requests:
            cpu: "1500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "8Gi"
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        hostPath:
          path: /home/faisal/EventMarketDB/logs
          type: DirectoryOrCreate
      terminationGracePeriodSeconds: 180
