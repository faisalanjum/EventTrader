apiVersion: v1
kind: Namespace
metadata:
  name: neo4j
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: neo4j
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      nodeSelector:
        kubernetes.io/hostname: minisforum3
      tolerations:
      - key: "database"
        operator: "Equal"
        value: "neo4j"
        effect: "NoSchedule"
      initContainers:
      # Copy all plugins from host
      - name: copy-plugins
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Copying plugins from host..."
          cp -v /host-plugins/* /plugins/
          chmod 644 /plugins/*.jar
          ls -la /plugins/
          echo "Plugins copied successfully"
        volumeMounts:
        - name: plugins
          mountPath: /plugins
        - name: host-plugins
          mountPath: /host-plugins
          readOnly: true
      containers:
      - name: neo4j
        image: neo4j:5.26.4-enterprise
        env:
        # NEO4J_AUTH is only read on FIRST startup (empty /data). Once auth lives
        # inside /data/dbms/auth, this value is ignored. We reference the
        # neo4j-init-auth Secret instead of inlining the literal — password never
        # lives in this repo. Live rotation is done via Cypher:
        #   ALTER CURRENT USER SET PASSWORD FROM '<old>' TO '<new>'
        # then update NEO4J_PASSWORD in eventtrader-secrets + neo4j-init-auth
        # NEO4J_AUTH key + .env + ~/.bashrc + restart dependents.
        - name: NEO4J_AUTH
          valueFrom:
            secretKeyRef:
              name: neo4j-init-auth
              key: NEO4J_AUTH
        - name: NEO4J_EDITION
          value: "ENTERPRISE"
        - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
          value: "yes"
        # Prometheus metrics — scraped by Prometheus at :2004/metrics via
        # headless Service neo4j.neo4j.svc.cluster.local (stable DNS for StatefulSet).
        - name: NEO4J_server_metrics_prometheus_enabled
          value: "true"
        - name: NEO4J_server_metrics_prometheus_endpoint
          value: "0.0.0.0:2004"
        # Memory settings — tuned values from neo4j-memory-increase-implementation.md.
        # Heap 26G + pagecache 68G = 94G working set; pod limit 100Gi gives 6G overhead.
        # Previously drifted via live kubectl patch; now persisted in YAML.
        - name: NEO4J_server_memory_heap_initial__size
          value: "26G"
        - name: NEO4J_server_memory_heap_max__size
          value: "26G"
        - name: NEO4J_server_memory_pagecache_size
          value: "68G"
        - name: NEO4J_db_memory_transaction_global__max
          value: "8G"
        - name: NEO4J_db_memory_transaction_max
          value: "4G"
        - name: NEO4J_db_tx__timeout
          value: "30m"
        - name: NEO4J_server_jvm_additional
          value: "-XX:+UseG1GC -XX:MaxGCPauseMillis=200"
        - name: NEO4J_server_default__listen__address
          value: "0.0.0.0"
        - name: NEO4J_server_config_strict__validation_enabled
          value: "false"
        # Plugin configuration
        - name: NEO4J_dbms_security_procedures_unrestricted
          value: "apoc.*,genai.*,gds.*"
        - name: NEO4J_dbms_security_procedures_allowlist
          value: "apoc.*,genai.*,gds.*"
        # Enable APOC triggers and other features
        - name: NEO4J_apoc_trigger_enabled
          value: "true"
        - name: NEO4J_apoc_uuid_enabled
          value: "true"
        - name: NEO4J_apoc_import_file_enabled
          value: "true"
        - name: NEO4J_apoc_export_file_enabled
          value: "true"
        ports:
        - containerPort: 7687
          name: bolt
        - containerPort: 7474
          name: http
        - containerPort: 7473
          name: https
        - containerPort: 2004
          name: metrics
        volumeMounts:
        - name: data
          mountPath: /data
        - name: logs
          mountPath: /logs
        - name: plugins
          mountPath: /var/lib/neo4j/plugins
        resources:
          requests:
            memory: "100Gi"
            cpu: "8"
          limits:
            memory: "100Gi"
            cpu: "16"
        livenessProbe:
          httpGet:
            path: /
            port: 7474
          initialDelaySeconds: 300
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 7474
          initialDelaySeconds: 30
          periodSeconds: 3
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: plugins
        emptyDir: {}
      - name: host-plugins
        hostPath:
          path: /opt/neo4j/plugins
          type: Directory
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: local-path-minisforum3
      resources:
        requests:
          storage: 1536Gi
  - metadata:
      name: logs
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: local-path-minisforum3
      resources:
        requests:
          storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: neo4j
spec:
  clusterIP: None
  selector:
    app: neo4j
  ports:
  - port: 7687
    targetPort: 7687
    name: bolt
  - port: 7474
    targetPort: 7474
    name: http
  - port: 2004
    targetPort: 2004
    name: metrics
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-bolt
  namespace: neo4j
spec:
  # Pinned ClusterIP so this Service survives a delete+apply without picking a new IP.
  # Matches live assignment at 2026-04-24. Host-side Bolt callers depend on stability.
  clusterIP: 10.102.222.120
  type: NodePort
  selector:
    app: neo4j
  ports:
  - port: 7687
    targetPort: 7687
    nodePort: 30687
    name: bolt
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-http
  namespace: neo4j
spec:
  type: NodePort
  selector:
    app: neo4j
  ports:
  - port: 7474
    targetPort: 7474
    nodePort: 30474
    name: http