apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-neo4j-cypher-http
  namespace: mcp-services
  labels:
    app: mcp-neo4j-cypher-http
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-neo4j-cypher-http
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: mcp-neo4j-cypher-http
    spec:
      nodeSelector:
        kubernetes.io/hostname: minisforum
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
      - effect: NoSchedule
        key: dedicated
        operator: Equal
        value: graph
      terminationGracePeriodSeconds: 30
      containers:
      - name: mcp-neo4j-cypher-http
        # IMPORTANT: update this tag for each rebuild. Reuses the existing
        # faisalanjum/mcp-neo4j-cypher public repo (do NOT switch to :latest —
        # that still points at the 9-month-old sleep-infinity image).
        image: faisalanjum/mcp-neo4j-cypher:http-v0.2.1-mcp1.26.0-2026-04-24-0123113
        imagePullPolicy: IfNotPresent
        env:
        - name: NEO4J_URI
          value: bolt://neo4j-bolt.neo4j:7687
        - name: NEO4J_USERNAME
          valueFrom:
            secretKeyRef:
              key: NEO4J_USERNAME
              name: eventtrader-secrets
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              key: NEO4J_PASSWORD
              name: eventtrader-secrets
        - name: NEO4J_DATABASE
          value: neo4j
        - name: PYTHONUNBUFFERED
          value: "1"
        ports:
        - name: http
          containerPort: 8000
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 250m
            memory: 512Mi
        # Readiness checks Neo4j reachability via /health → stops routing traffic
        # to the pod while Neo4j is unreachable, but does NOT kill the pod
        # (self-healing when Neo4j returns).
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        # Liveness is process-level ONLY — do NOT couple to Neo4j, otherwise a
        # Neo4j maintenance restart would cascade-kill this pod and trigger
        # CrashLoopBackOff until Neo4j recovers.
        livenessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-neo4j-cypher-http
  namespace: mcp-services
  labels:
    app: mcp-neo4j-cypher-http
spec:
  # Pinned ClusterIP so this Service survives a delete+apply without picking a new IP.
  # Matches live assignment at 2026-04-24. Host-side .mcp.json depends on stability.
  clusterIP: 10.97.161.242
  selector:
    app: mcp-neo4j-cypher-http
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
