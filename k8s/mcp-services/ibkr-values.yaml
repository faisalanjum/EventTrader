# IBKR MCP Server — Helm Values (Live MCP only)
# Paper gateway + paper MCP are managed via separate manifests:
#   k8s/mcp-services/ibkr-paper-gateway.yaml
#   k8s/mcp-services/ibkr-paper-mcp.yaml
#
# This Helm chart manages: ibkr-ib-gateway (live) + ibkr MCP server (live)
# NodePort 31100 = live MCP, NodePort 31101 = paper MCP (separate manifest)

ibGateway:
  image:
    # Custom image: gnzsnz/ib-gateway + xdotool for Login Messages dismissal
    # Build: docker build -t ibkr-gateway-xdotool:stable docker/ibkr-gateway-xdotool/
    # Import: docker save ibkr-gateway-xdotool:stable | ctr -n k8s.io images import -
    repository: ibkr-gateway-xdotool
    tag: "stable"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    ports:
      vnc: 6080
      api: 4003    # socat forwards 4003→4001 inside the container
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 2Gi
  startupProbe:
    periodSeconds: 30
    failureThreshold: 40
    timeoutSeconds: 5

mcpServer:
  replicaCount: 1
  image:
    repository: ibkr-mcp-server
    tag: "phase2"
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ingress:
    enabled: false

# Gateway config — gnzsnz/ib-gateway env vars (UPPER_SNAKE_CASE, no IBC_ prefix)
# Verified against config.ini.tmpl envsubst variables on 2026-04-01
gatewayConfig:
  tradingMode: "live"
  readOnlyApi: "no"
  twofaTimeoutAction: "restart"
  reloginAfterTwofaTimeout: "yes"
  existingSessionDetectedAction: "primary"   # was: primaryoverride (caused re-login loop)
  autoRestartTime: "05:45 AM"                # daily IBC re-auth before IBKR's forced disconnect
  coldRestartTime: "10:00"
  acceptIncoming: "accept"                   # was: empty (silently broken!)
  vncPassword: "ibkr123"
  # CommandServerPort, ControlFrom, BindAddress, SuppressInfoMessages,
  # DismissNSEComplianceNotice, AcceptBidAskLastSizeDisplayUpdateNotification
  # are HARDCODED in gnzsnz config.ini template — not configurable via env vars.

# MCP server config — omdv/ibkr-mcp-server env vars (IBKR_ prefix)
mcpConfig:
  logLevel: "INFO"
  corsAllowedOrigins: "*"
  enableMcp: "true"

gatewaySecret:
  existingSecret: "ibkr-credentials"

mcpAuth:
  create: false
  existingSecret: "ibkr-mcp-auth-static"  # external secret — Helm doesn't manage or rotate this

networkPolicy:
  enabled: false

nodeSelector:
  kubernetes.io/hostname: minisforum

tolerations:
- effect: NoSchedule
  key: node-role.kubernetes.io/control-plane
  operator: Exists
- effect: NoSchedule
  key: dedicated
  operator: Equal
  value: graph
