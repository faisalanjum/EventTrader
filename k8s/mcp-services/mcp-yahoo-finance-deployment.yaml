apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-yahoo-finance
  namespace: mcp-services
  labels:
    app: mcp-yahoo-finance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-yahoo-finance
  template:
    metadata:
      labels:
        app: mcp-yahoo-finance
    spec:
      nodeSelector:
        kubernetes.io/hostname: minisforum
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
      - effect: NoSchedule
        key: dedicated
        operator: Equal
        value: graph
      containers:
      - name: mcp-yahoo-finance
        image: python:3.11-slim
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -e
          pip install --no-cache-dir 'yfinance>=1.2.0' 'mcp[cli]>=1.6.0' 'uvicorn>=0.35.0'
          echo "Starting Yahoo Finance MCP server (HTTP)..."
          python /source/mcp_servers/yahoo_finance_server.py
        env:
        - name: MCP_TRANSPORT
          value: http
        - name: PYTHONUNBUFFERED
          value: "1"
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 250m
            memory: 512Mi
        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
        volumeMounts:
        - mountPath: /source
          name: source-code
      volumes:
      - name: source-code
        hostPath:
          path: /home/faisal/EventMarketDB
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-yahoo-finance
  namespace: mcp-services
  labels:
    app: mcp-yahoo-finance
spec:
  selector:
    app: mcp-yahoo-finance
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
