apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ibkr.fullname" . }}-ib-gateway
  labels:
    {{- include "ibkr.labels" . | nindent 4 }}
    app.kubernetes.io/component: ib-gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "ibkr.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ib-gateway
  template:
    metadata:
      labels:
        {{- include "ibkr.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ib-gateway
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: ib-gateway
        image: "{{ .Values.ibGateway.image.repository }}:{{ .Values.ibGateway.image.tag }}"
        imagePullPolicy: {{ .Values.ibGateway.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.ibGateway.service.ports.vnc }}
        - containerPort: {{ .Values.ibGateway.service.ports.api }}
        securityContext:
          capabilities:
            add:
              - SYS_RESOURCE
        resources:
          {{- toYaml .Values.ibGateway.resources | nindent 10 }}
        # gnzsnz/ib-gateway env vars — verified against config.ini.tmpl on 2026-04-01
        # DO NOT use envFrom with configmap — gateway and MCP server have different env contracts
        env:
        - name: TWS_USERID
          valueFrom:
            secretKeyRef:
              name: {{ include "ibkr.gatewaySecretName" . }}
              key: username
        - name: TWS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "ibkr.gatewaySecretName" . }}
              key: password
        - name: TRADING_MODE
          value: {{ .Values.gatewayConfig.tradingMode | quote }}
        - name: READ_ONLY_API
          value: {{ .Values.gatewayConfig.readOnlyApi | quote }}
        - name: TWOFA_TIMEOUT_ACTION
          value: {{ .Values.gatewayConfig.twofaTimeoutAction | quote }}
        - name: RELOGIN_AFTER_TWOFA_TIMEOUT
          value: {{ .Values.gatewayConfig.reloginAfterTwofaTimeout | quote }}
        - name: EXISTING_SESSION_DETECTED_ACTION
          value: {{ .Values.gatewayConfig.existingSessionDetectedAction | quote }}
        - name: AUTO_RESTART_TIME
          value: {{ .Values.gatewayConfig.autoRestartTime | quote }}
        - name: TWS_COLD_RESTART
          value: {{ .Values.gatewayConfig.coldRestartTime | quote }}
        - name: TWS_ACCEPT_INCOMING
          value: {{ .Values.gatewayConfig.acceptIncoming | quote }}
        - name: ACCEPT_NON_BROKERAGE_ACCOUNT_WARNING
          value: "yes"
        - name: VNC_SERVER_PASSWORD
          value: {{ .Values.gatewayConfig.vncPassword | quote }}
        - name: IBC_SCRIPTS
          value: "ibc-scripts"
        - name: TWS_SETTINGS_PATH
          value: /home/ibgateway/tws_settings
        volumeMounts:
        - name: dismiss-script
          mountPath: /home/ibgateway/ibc-scripts
        - name: tws-settings
          mountPath: /home/ibgateway/tws_settings
        startupProbe:
          tcpSocket:
            port: 4001
          periodSeconds: {{ .Values.ibGateway.startupProbe.periodSeconds }}
          failureThreshold: {{ .Values.ibGateway.startupProbe.failureThreshold }}
          timeoutSeconds: {{ .Values.ibGateway.startupProbe.timeoutSeconds }}
        readinessProbe:
          tcpSocket:
            port: 4001
          periodSeconds: 30
          failureThreshold: 3
          timeoutSeconds: 5
        # NO liveness probe on live gateway — restart = 2FA
      volumes:
      - name: dismiss-script
        configMap:
          name: ibkr-login-dismiss-script
          defaultMode: 0755
      - name: tws-settings
        persistentVolumeClaim:
          claimName: ibkr-live-jts-home
      restartPolicy: Always
