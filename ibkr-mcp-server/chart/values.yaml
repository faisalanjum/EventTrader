imagePullSecrets: []

ibGateway:
  image:
    repository: ibkr-gateway-xdotool
    tag: "stable"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    ports:
      vnc: 6080
      api: 4003    # socat forwards 4003→4001 inside the container

  resources: {}
    # limits:
    #   memory: "2Gi"
    #   cpu: "2000m"
    # requests:
    #   memory: "1Gi"
    #   cpu: "1000m"

  # startupProbe runs instead of liveness until port 4001 first opens.
  # Budget must cover the full 2FA authentication wait.
  startupProbe:
    periodSeconds: 30
    failureThreshold: 40    # 40 × 30s = 20 min ceiling for 2FA
    timeoutSeconds: 5


mcpServer:
  replicaCount: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  image:
    repository: ghcr.io/omdv/ibkr-mcp-server
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8000

  ingress:
    enabled: false
    className: nginx
    host: ibkr-mcp-server.local
    path: /
    pathType: Prefix
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls: []

  livenessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  readinessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 25
    failureThreshold: 10

# Gateway config — gnzsnz/ib-gateway env vars (UPPER_SNAKE_CASE, no IBC_ prefix)
gatewayConfig:
  tradingMode: "live"
  readOnlyApi: "no"
  twofaTimeoutAction: "restart"
  reloginAfterTwofaTimeout: "yes"
  existingSessionDetectedAction: "primary"
  autoRestartTime: "06:00 AM"
  coldRestartTime: "10:00"
  acceptIncoming: "accept"
  vncPassword: ""

# MCP server config — omdv/ibkr-mcp-server env vars (IBKR_ prefix)
mcpConfig:
  logLevel: "INFO"
  corsAllowedOrigins: "*"
  enableMcp: "false"

# IB Gateway credentials
gatewaySecret:
  existingSecret: ""

# MCP Server authentication
mcpAuth:
  create: true
  existingSecret: ""
  authToken: ""

networkPolicy:
  enabled: true

nodeSelector: {}
tolerations: []
affinity: {}
